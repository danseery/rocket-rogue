name: Deploy Azure Static Web App

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build_and_deploy:
    runs-on: ubuntu-24.04
    env:
      EMSDK_VERSION: 6.0.0
      NODE_VERSION: 24

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Use Node.js 24
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Use Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: requirements-dev.txt

      - name: Verify committed scene atlas
        run: |
          python -m pip install -r requirements-dev.txt
          python tools/build-scene-atlas.test.py
          python tools/build-scene-atlas.py --check

      - name: Capture Node.js 24 path
        run: |
          echo "NODE24_BIN=$(dirname "$(command -v node)")" >> "$GITHUB_ENV"
          node --version

      - name: Install toolchain
        run: |
          chmod +x scripts/install-ubuntu.sh scripts/env-ubuntu.sh
          ./scripts/install-ubuntu.sh --emsdk-version "$EMSDK_VERSION" --web-only --skip-python-venv

      - name: Configure web build
        run: |
          source scripts/env-ubuntu.sh
          export PATH="$NODE24_BIN:$PATH"
          node --version
          cmake --preset web-release

      - name: Build web game
        run: |
          source scripts/env-ubuntu.sh
          export PATH="$NODE24_BIN:$PATH"
          cmake --build --preset web-release

      - name: Test web build
        run: |
          source scripts/env-ubuntu.sh
          export PATH="$NODE24_BIN:$PATH"
          node --version
          ctest --preset web-release
          node tools/sanity-check.mjs

      - name: Prepare static app package
        run: |
          node --version
          npm run prepare:azure

      - name: Deploy to Azure Static Web Apps
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN }}
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          action: upload
          app_location: dist/azure-static-web-app
          skip_app_build: true
