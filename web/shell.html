<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Rocket Rogue POC</title>
  <style>
    :root {
      color-scheme: dark;
      --bg: #090b0f;
      --panel: rgba(13, 18, 25, 0.88);
      --panel-border: rgba(137, 178, 211, 0.28);
      --text: #edf4f8;
      --muted: #99a9b8;
      --accent: #67d2ff;
      --danger: #ff6c5c;
      --ok: #72e0a8;
      --warn: #ffd166;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      overflow: hidden;
      background: var(--bg);
      color: var(--text);
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    #canvas {
      display: block;
      width: 100vw;
      height: 100vh;
      background: #05070a;
    }

    #panel {
      position: fixed;
      inset: 16px auto 16px 16px;
      width: min(420px, calc(100vw - 32px));
      overflow: auto;
      padding: 16px;
      border: 1px solid var(--panel-border);
      border-radius: 8px;
      background: var(--panel);
      backdrop-filter: blur(14px);
      box-shadow: 0 18px 60px rgba(0, 0, 0, 0.35);
    }

    h1, h2, h3, p {
      margin: 0;
    }

    h1 {
      font-size: 21px;
      line-height: 1.15;
      letter-spacing: 0;
    }

    h2 {
      margin-top: 14px;
      font-size: 14px;
      text-transform: uppercase;
      color: var(--muted);
      letter-spacing: 0;
    }

    p, li {
      color: var(--muted);
      font-size: 13px;
      line-height: 1.45;
    }

    ul {
      margin: 8px 0 0;
      padding-left: 18px;
    }

    .metric-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 8px;
      margin-top: 12px;
    }

    .metric {
      border: 1px solid rgba(137, 178, 211, 0.18);
      border-radius: 6px;
      padding: 8px;
      background: rgba(255, 255, 255, 0.035);
    }

    .metric strong {
      display: block;
      color: var(--text);
      font-size: 16px;
      line-height: 1.2;
    }

    .metric span {
      color: var(--muted);
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0;
    }

    .actions {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 8px;
      margin-top: 14px;
    }

    button {
      min-height: 38px;
      border: 1px solid rgba(137, 178, 211, 0.25);
      border-radius: 6px;
      background: rgba(103, 210, 255, 0.12);
      color: var(--text);
      font: inherit;
      font-size: 13px;
      cursor: pointer;
    }

    button:hover {
      background: rgba(103, 210, 255, 0.2);
    }

    button:disabled {
      color: rgba(153, 169, 184, 0.62);
      cursor: not-allowed;
      background: rgba(255, 255, 255, 0.035);
    }

    button.danger {
      background: rgba(255, 108, 92, 0.16);
      border-color: rgba(255, 108, 92, 0.4);
    }

    button.ok {
      background: rgba(114, 224, 168, 0.16);
      border-color: rgba(114, 224, 168, 0.36);
    }

    .warning-grid {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 6px;
      margin-top: 10px;
    }

    .warning-button {
      min-height: 48px;
      padding: 6px;
      border-color: rgba(137, 178, 211, 0.22);
      background: rgba(114, 224, 168, 0.08);
      cursor: default;
      text-align: left;
    }

    .warning-button:hover {
      background: rgba(114, 224, 168, 0.08);
    }

    .warning-button strong {
      display: block;
      font-size: 12px;
      line-height: 1.1;
      color: var(--text);
    }

    .warning-button span {
      display: block;
      margin-top: 4px;
      color: var(--muted);
      font-size: 12px;
      line-height: 1.1;
    }

    .warning-button.caution {
      border-color: rgba(255, 209, 102, 0.56);
      background: rgba(255, 209, 102, 0.14);
    }

    .warning-button.critical {
      border-color: rgba(255, 108, 92, 0.72);
      background: rgba(255, 108, 92, 0.20);
      animation: pulse-alert 0.55s ease-in-out infinite alternate;
    }

    @keyframes pulse-alert {
      from {
        box-shadow: 0 0 0 rgba(255, 108, 92, 0);
      }
      to {
        box-shadow: 0 0 18px rgba(255, 108, 92, 0.35);
      }
    }

    .status {
      margin-top: 12px;
      color: var(--warn);
    }

    .tag-row {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      margin-top: 8px;
    }

    .tag {
      border: 1px solid rgba(137, 178, 211, 0.22);
      border-radius: 999px;
      padding: 3px 7px;
      color: var(--muted);
      font-size: 11px;
      white-space: nowrap;
    }

    @media (max-width: 720px) {
      #panel {
        inset: auto 10px 10px 10px;
        width: auto;
        max-height: 52vh;
      }
    }
  </style>
</head>
<body>
  <canvas id="canvas" oncontextmenu="event.preventDefault()" tabindex="-1"></canvas>
  <aside id="panel">
    <h1>Rocket Rogue</h1>
    <p class="status">Loading WebAssembly...</p>
  </aside>

  <script>
    const panel = document.getElementById("panel");
    const canvas = document.getElementById("canvas");

    window.RocketBridge = {
      setPanel(html) {
        panel.innerHTML = html;
      },
      loadSave() {
        return window.localStorage.getItem("rocket_rogue_save_v1") || "";
      },
      storeSave(data) {
        window.localStorage.setItem("rocket_rogue_save_v1", data || "");
      },
      clearSave() {
        window.localStorage.removeItem("rocket_rogue_save_v1");
      }
    };

    function rrCall(name, args = [], sig = []) {
      if (!window.Module || !Module.ccall) {
        return;
      }
      Module.ccall(name, null, sig, args);
    }

    window.rr = {
      startLaunch: () => rrCall("rr_start_launch"),
      ejectNow: () => rrCall("rr_eject_now"),
      returnHome: () => rrCall("rr_return_home"),
      next: () => rrCall("rr_next"),
      adjustTarget: (delta) => rrCall("rr_adjust_target", [delta], ["number"]),
      attemptFrontier: () => rrCall("rr_attempt_frontier"),
      buyOffer: (index) => rrCall("rr_buy_offer", [index], ["number"]),
      repairShip: () => rrCall("rr_repair_ship"),
      trainCrew: () => rrCall("rr_train_crew"),
      restCrew: () => rrCall("rr_rest_crew"),
      resetSave: () => {
        if (window.confirm("Reset Rocket Rogue save data?")) {
          rrCall("rr_reset_save");
        }
      }
    };

    const rrActions = {
      "rr.startLaunch()": () => rr.startLaunch(),
      "rr.ejectNow()": () => rr.ejectNow(),
      "rr.returnHome()": () => rr.returnHome(),
      "rr.next()": () => rr.next(),
      "rr.adjustTarget(-1)": () => rr.adjustTarget(-1),
      "rr.adjustTarget(1)": () => rr.adjustTarget(1),
      "rr.attemptFrontier()": () => rr.attemptFrontier(),
      "rr.buyOffer(0)": () => rr.buyOffer(0),
      "rr.buyOffer(1)": () => rr.buyOffer(1),
      "rr.buyOffer(2)": () => rr.buyOffer(2),
      "rr.repairShip()": () => rr.repairShip(),
      "rr.trainCrew()": () => rr.trainCrew(),
      "rr.restCrew()": () => rr.restCrew(),
      "rr.resetSave()": () => rr.resetSave()
    };

    let lastPanelActionAt = 0;
    let lastPanelAction = "";

    function runPanelAction(action) {
      const handler = rrActions[action];
      if (!handler) {
        return false;
      }
      lastPanelAction = action;
      lastPanelActionAt = performance.now();
      handler();
      return true;
    }

    function handlePanelAction(event) {
      const button = event.target.closest("button[data-rr-action]");
      if (!button || !panel.contains(button) || button.disabled) {
        return;
      }

      const action = button.dataset.rrAction || "";
      event.preventDefault();
      event.stopPropagation();

      if (event.type === "click" && action === lastPanelAction && performance.now() - lastPanelActionAt < 180) {
        return;
      }

      runPanelAction(action);
    }

    panel.addEventListener("pointerdown", handlePanelAction, true);
    panel.addEventListener("click", handlePanelAction, true);
    panel.addEventListener("keydown", (event) => {
      if (event.key !== "Enter" && event.key !== " ") {
        return;
      }
      handlePanelAction(event);
    }, true);

    window.addEventListener("keydown", (event) => {
      if (event.repeat || event.ctrlKey || event.metaKey || event.altKey) {
        return;
      }
      if (event.key.toLowerCase() === "r") {
        rr.returnHome();
      } else if (event.key.toLowerCase() === "e") {
        rr.ejectNow();
      }
    });

    var Module = {
      canvas,
      print(text) {
        console.log(text);
      },
      printErr(text) {
        console.error(text);
      }
    };
  </script>
  {{{ SCRIPT }}}
</body>
</html>
