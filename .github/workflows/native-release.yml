name: Native Windows and Linux builds

on:
  workflow_dispatch:
  pull_request:
    paths:
      - "CMakeLists.txt"
      - "CMakePresets.json"
      - "cmake/**"
      - "assets/**"
      - "licenses/**"
      - "src/**"
      - "tests/**"
      - "third_party/**"
      - "requirements-dev.txt"
      - "tools/build-scene-atlas*.py"
      - "tools/build-vulkan-shaders*.mjs"
      - "tools/summarize-native-benchmarks*.mjs"
      - "tools/check-platform-boundaries.mjs"
      - ".github/workflows/native-release.yml"
  push:
    branches: [main]
    paths:
      - "CMakeLists.txt"
      - "CMakePresets.json"
      - "cmake/**"
      - "assets/**"
      - "licenses/**"
      - "src/**"
      - "tests/**"
      - "third_party/**"
      - "requirements-dev.txt"
      - "tools/build-scene-atlas*.py"
      - "tools/build-vulkan-shaders*.mjs"
      - "tools/summarize-native-benchmarks*.mjs"
      - "tools/check-platform-boundaries.mjs"
      - ".github/workflows/native-release.yml"

permissions:
  contents: read

jobs:
  windows-x64:
    name: Windows x86-64
    runs-on: windows-2022
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: requirements-dev.txt
      - name: Verify committed scene atlas
        run: |
          python -m pip install -r requirements-dev.txt
          python tools/build-scene-atlas.test.py
          python tools/build-scene-atlas.py --check
      - uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x64

      - name: Configure and build Debug
        run: |
          cmake --preset native-debug
          cmake --build --preset native-debug

      - name: Test Debug
        run: ctest --preset native-debug

      - name: Configure, build, and test Release
        run: |
          cmake --preset native-release
          cmake --build --preset native-release
          ctest --preset native-release

      - name: Verify native graphics imports
        shell: pwsh
        run: |
          $imports = dumpbin /dependents build/native-release/bin/RocketRogue.exe | Out-String
          if ($imports -match '(?i)opengl32\.dll|vulkan-1\.dll') {
            throw "Native executable must contain neither an OpenGL fallback nor a linked Vulkan loader."
          }

      - name: Configure, build, and test profiler-oriented native build
        run: |
          cmake --preset native-profile
          cmake --build --preset native-profile
          ctest --preset native-profile

      - name: Package Release
        run: cmake --build --preset package-native

      - name: Verify portable archive
        shell: pwsh
        run: |
          $archive = "build/packages/RocketRogue-windows-x64.zip"
          if (-not (Test-Path -LiteralPath $archive)) { throw "Missing $archive" }
          $listing = 7z l $archive | Out-String
          if ($listing -match '(?i)electron|chromium|node\.exe|\.wasm(?:\s|$)|rocket_rogue\.html|vulkan-1\.dll|libvulkan|assets\\art') {
            throw "A browser runtime, Vulkan loader, or duplicate source-art directory escaped into the native archive."
          }
          if ($listing -notmatch 'RocketRogue\.exe' -or $listing -notmatch 'assets\\scene-atlas' -or $listing -notmatch 'licenses') {
            throw "Native archive is missing the executable, scene atlas, or licenses."
          }
          $required = @(
            'scene-atlas-0.png', 'scene-atlas-1.png', 'scene-atlas.json',
            'scene.vert.spv', 'scene.frag.spv', 'scene_instance.vert.spv', 'scene_instance.frag.spv',
            'rml_ui.vert.spv', 'rml_ui.frag.spv',
            'Vulkan-Headers.txt', 'Volk.txt', 'VulkanMemoryAllocator.txt'
          )
          foreach ($entry in $required) {
            if ($listing -notmatch [regex]::Escape($entry)) { throw "Native archive is missing $entry" }
          }

      - uses: actions/upload-artifact@v4
        with:
          name: RocketRogue-windows-x64
          path: build/packages/RocketRogue-windows-x64.zip
          if-no-files-found: error

      - uses: actions/upload-artifact@v4
        with:
          name: RocketRogue-windows-x64-symbols
          path: build/native-release/bin/RocketRogue.pdb
          if-no-files-found: error

  linux-x64:
    name: Linux x86-64 (Steam Runtime 4 SDK)
    runs-on: ubuntu-24.04
    container:
      image: registry.gitlab.steamos.cloud/proton/steamrt4/sdk/x86_64:4.0.20260331.220802-0
      options: --user root
    steps:
      - uses: actions/checkout@v4

      - name: Install Linux runner prerequisites
        shell: bash
        run: |
          apt-get update
          apt-get install -y --no-install-recommends lsb-release python3 python3-pip

      - name: Verify committed scene atlas
        shell: bash
        run: |
          python3 -m pip install --break-system-packages -r requirements-dev.txt
          python3 tools/build-scene-atlas.test.py
          python3 tools/build-scene-atlas.py --check

      - uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Install headless Vulkan correctness dependencies
        shell: bash
        run: |
          apt-get update
          apt-get install -y --no-install-recommends \
            curl xz-utils xvfb xauth mesa-vulkan-drivers vulkan-tools \
            vulkan-validationlayers

      - name: Install pinned Vulkan shader tools
        shell: bash
        env:
          VULKAN_SDK_VERSION: 1.4.350.0
          VULKAN_SDK_SHA256: b65f068ab36263559da49d7cacd7e7b9df23824ca8b68ccc522a2b06f5725df2
        run: |
          archive="$RUNNER_TEMP/vulkan_sdk.tar.xz"
          install_root="$RUNNER_TEMP/vulkan-sdk"
          curl --fail --location --retry 5 \
            "https://sdk.lunarg.com/sdk/download/${VULKAN_SDK_VERSION}/linux/vulkan_sdk.tar.xz" \
            --output "$archive"
          printf '%s  %s\n' "$VULKAN_SDK_SHA256" "$archive" | sha256sum --check --strict
          mkdir -p "$install_root"
          tar -xf "$archive" -C "$install_root"
          sdk_root="$install_root/$VULKAN_SDK_VERSION/x86_64"
          test -x "$sdk_root/bin/glslc"
          test -x "$sdk_root/bin/spirv-val"
          printf 'VULKAN_SDK=%s\n' "$sdk_root" >> "$GITHUB_ENV"

      - name: Verify committed Vulkan SPIR-V
        shell: bash
        run: LD_LIBRARY_PATH="$VULKAN_SDK/lib${LD_LIBRARY_PATH:+:$LD_LIBRARY_PATH}" node tools/build-vulkan-shaders.mjs --check

      - name: Configure and build Debug
        shell: bash
        run: |
          cmake --preset native-debug
          cmake --build --preset native-debug

      - name: Test Debug
        shell: bash
        run: ctest --preset native-debug

      - name: Configure, build, and test Release
        shell: bash
        run: |
          cmake --preset native-release
          cmake --build --preset native-release
          ctest --preset native-release

      - name: Configure, build, and test profiler-oriented native build
        shell: bash
        run: |
          cmake --preset native-profile
          cmake --build --preset native-profile
          ctest --preset native-profile

      - name: Correctness-only lavapipe startup smoke with Vulkan validation
        shell: bash
        run: |
          dependencies="$(ldd build/native-release/bin/RocketRogue)"
          printf '%s\n' "$dependencies"
          if printf '%s\n' "$dependencies" | grep -F "not found"; then
            echo "A required dynamic library is missing." >&2
            exit 1
          fi
          if printf '%s\n' "$dependencies" | grep -Eiq 'lib(GL|EGL|GLES|vulkan)'; then
            echo "Native executable linked an OpenGL library or Vulkan loader instead of using the direct Vulkan boundary." >&2
            exit 1
          fi
          if ! command -v xvfb-run >/dev/null || ! command -v timeout >/dev/null; then
            echo "The pinned Steam Runtime SDK smoke environment is missing xvfb-run or timeout." >&2
            exit 1
          fi
          lvp_icd="$(find /usr/share/vulkan/icd.d /etc/vulkan/icd.d -type f -name '*lvp*.json' -print -quit 2>/dev/null)"
          if [ -z "$lvp_icd" ]; then
            echo "lavapipe Vulkan ICD was not installed." >&2
            exit 1
          fi
          # Debug explicitly enables the installed Khronos layer.  Avoid
          # VK_INSTANCE_LAYERS injection: the layer reports that injection as a
          # warning through debug-utils, which would make a clean smoke noisy.
          executable="$GITHUB_WORKSPACE/build/native-debug/bin/RocketRogue"
          smoke_log="$RUNNER_TEMP/orebit-vulkan-smoke.log"
          report="$RUNNER_TEMP/orebit-vulkan-smoke.json"
          profile="$RUNNER_TEMP/orebit-vulkan-smoke-profile"
          cd "$RUNNER_TEMP"
          set +e
          VK_DRIVER_FILES="$lvp_icd" \
          VK_ICD_FILENAMES="$lvp_icd" \
          VK_LAYER_VALIDATE_SYNC=1 \
            timeout 45s xvfb-run -a "$executable" \
              --benchmark-scenario mining \
              --benchmark-warmup-seconds 0 \
              --benchmark-frame-count 30 \
              --benchmark-renderer vulkan \
              --benchmark-resolution 1280x800 \
              --benchmark-json "$report" \
              --benchmark-profile-dir "$profile" \
              >"$smoke_log" 2>&1
          status=$?
          set -e
          cat "$smoke_log"
          if [ "$status" -ne 0 ]; then
            echo "Native Linux startup smoke test exited unexpectedly with $status." >&2
            exit 1
          fi
          test -s "$report"
          if grep -Eq '^(WARNING|ERROR): Vulkan validation:' "$smoke_log"; then
            echo "Vulkan validation reported a warning or error during the correctness smoke." >&2
            exit 1
          fi

      - name: Split debug symbols and package Release
        shell: bash
        run: |
          mkdir -p build/packages
          objcopy --only-keep-debug build/native-release/bin/RocketRogue build/packages/RocketRogue-linux-x64.debug
          strip --strip-debug --strip-unneeded build/native-release/bin/RocketRogue
          objcopy --add-gnu-debuglink=build/packages/RocketRogue-linux-x64.debug build/native-release/bin/RocketRogue
          cmake --build --preset package-native

      - name: Verify portable archive
        shell: bash
        run: |
          archive="build/packages/RocketRogue-linux-x64.tar.gz"
          test -f "$archive"
          listing="$(tar -tzf "$archive")"
          if printf '%s\n' "$listing" | grep -Eiq 'electron|chromium|node(\.exe)?$|\.wasm$|rocket_rogue\.html$|vulkan-1\.dll$|libvulkan|assets/art/'; then
            echo "A browser runtime, Vulkan loader, or duplicate source-art directory escaped into the native archive." >&2
            exit 1
          fi
          printf '%s\n' "$listing" | grep -Eq '(^|/)RocketRogue$'
          printf '%s\n' "$listing" | grep -Eq '(^|/)assets/scene-atlas/'
          printf '%s\n' "$listing" | grep -Eq '(^|/)licenses/'
          for required in \
            scene-atlas-0.png scene-atlas-1.png scene-atlas.json \
            scene.vert.spv scene.frag.spv scene_instance.vert.spv scene_instance.frag.spv \
            rml_ui.vert.spv rml_ui.frag.spv \
            Vulkan-Headers.txt Volk.txt VulkanMemoryAllocator.txt; do
            printf '%s\n' "$listing" | grep -Fq "$required"
          done

      - uses: actions/upload-artifact@v4
        with:
          name: RocketRogue-linux-x64
          path: build/packages/RocketRogue-linux-x64.tar.gz
          if-no-files-found: error

      - uses: actions/upload-artifact@v4
        with:
          name: RocketRogue-linux-x64-symbols
          path: build/packages/RocketRogue-linux-x64.debug
          if-no-files-found: error
