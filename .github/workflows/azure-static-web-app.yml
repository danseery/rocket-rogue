name: Deploy Azure Static Web App

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build_and_deploy:
    runs-on: ubuntu-latest
    env:
      EMSDK_VERSION: 6.0.0

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install toolchain
        run: |
          chmod +x scripts/install-ubuntu.sh scripts/env-ubuntu.sh
          ./scripts/install-ubuntu.sh --emsdk-version "$EMSDK_VERSION" --skip-native-compiler --skip-python-venv

      - name: Configure web build
        run: |
          source scripts/env-ubuntu.sh
          cmake --preset web-release

      - name: Build web game
        run: |
          source scripts/env-ubuntu.sh
          cmake --build --preset web-release

      - name: Test web build
        run: |
          source scripts/env-ubuntu.sh
          ctest --preset web-release
          node tools/sanity-check.mjs

      - name: Prepare static app package
        run: npm run prepare:azure

      - name: Deploy to Azure Static Web Apps
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN }}
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          action: upload
          app_location: dist/azure-static-web-app
          skip_app_build: true
