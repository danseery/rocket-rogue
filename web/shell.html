<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Rocket Rogue POC</title>
  <style>
    :root {
      color-scheme: dark;
      --bg: #090b0f;
      --panel: rgba(13, 18, 25, 0.88);
      --panel-border: rgba(137, 178, 211, 0.28);
      --text: #edf4f8;
      --muted: #99a9b8;
      --accent: #67d2ff;
      --danger: #ff6c5c;
      --ok: #72e0a8;
      --warn: #ffd166;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      overflow: hidden;
      background: var(--bg);
      color: var(--text);
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    #canvas {
      display: block;
      position: fixed;
      inset: 0;
      width: 100vw;
      height: 100dvh;
      background: #05070a;
    }

    #panel {
      position: fixed;
      inset: 16px auto 16px 16px;
      width: min(440px, calc(100vw - 32px));
      max-height: calc(100dvh - 32px);
      overflow: auto;
      padding: 16px;
      border: 1px solid var(--panel-border);
      border-radius: 8px;
      background: var(--panel);
      backdrop-filter: blur(14px);
      box-shadow: 0 18px 60px rgba(0, 0, 0, 0.35);
    }

    .panel-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
    }

    h1, h2, h3, p {
      margin: 0;
    }

    h1 {
      font-size: 21px;
      line-height: 1.15;
      letter-spacing: 0;
    }

    h2 {
      margin-top: 14px;
      font-size: 14px;
      text-transform: uppercase;
      color: var(--muted);
      letter-spacing: 0;
    }

    p, li {
      color: var(--muted);
      font-size: 13px;
      line-height: 1.45;
    }

    ul {
      margin: 8px 0 0;
      padding-left: 18px;
    }

    .metric-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 8px;
      margin-top: 12px;
    }

    .metric {
      border: 1px solid rgba(137, 178, 211, 0.18);
      border-radius: 6px;
      padding: 8px;
      background: rgba(255, 255, 255, 0.035);
    }

    .metric strong {
      display: block;
      color: var(--text);
      font-size: 16px;
      line-height: 1.2;
    }

    .metric span {
      color: var(--muted);
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0;
    }

    .actions {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 8px;
      margin-top: 14px;
    }

    .actions.launch-actions {
      grid-template-columns: repeat(3, minmax(0, 1fr));
    }

    .actions.primary-actions {
      grid-template-columns: repeat(2, minmax(0, 1fr));
    }

    .actions.system-actions {
      grid-template-columns: repeat(3, minmax(0, 1fr));
      margin-top: 8px;
    }

    button {
      min-height: 38px;
      border: 1px solid rgba(137, 178, 211, 0.25);
      border-radius: 6px;
      background: rgba(103, 210, 255, 0.12);
      color: var(--text);
      font: inherit;
      font-size: 13px;
      cursor: pointer;
    }

    button:hover {
      background: rgba(103, 210, 255, 0.2);
    }

    button:disabled {
      color: rgba(153, 169, 184, 0.62);
      cursor: not-allowed;
      background: rgba(255, 255, 255, 0.035);
    }

    button.danger {
      background: rgba(255, 108, 92, 0.16);
      border-color: rgba(255, 108, 92, 0.4);
    }

    button.ok {
      background: rgba(114, 224, 168, 0.16);
      border-color: rgba(114, 224, 168, 0.36);
    }

    button.warn {
      background: rgba(255, 209, 102, 0.18);
      border-color: rgba(255, 209, 102, 0.48);
    }

    button.ghost {
      min-height: 32px;
      background: rgba(255, 255, 255, 0.045);
      border-color: rgba(137, 178, 211, 0.18);
      color: var(--muted);
    }

    button.ghost:hover {
      color: var(--text);
      background: rgba(103, 210, 255, 0.12);
    }

    .warning-grid {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 6px;
      margin-top: 10px;
    }

    .warning-button {
      min-height: 48px;
      padding: 6px;
      border-color: rgba(137, 178, 211, 0.22);
      background: rgba(114, 224, 168, 0.08);
      cursor: default;
      text-align: left;
    }

    .warning-button:hover {
      background: rgba(114, 224, 168, 0.08);
    }

    .warning-button strong {
      display: block;
      font-size: 12px;
      line-height: 1.1;
      color: var(--text);
    }

    .warning-button span {
      display: block;
      margin-top: 4px;
      color: var(--muted);
      font-size: 12px;
      line-height: 1.1;
    }

    .warning-button.caution {
      border-color: rgba(255, 209, 102, 0.56);
      background: rgba(255, 209, 102, 0.14);
    }

    .warning-button.critical {
      border-color: rgba(255, 108, 92, 0.72);
      background: rgba(255, 108, 92, 0.20);
      animation: pulse-alert 0.55s ease-in-out infinite alternate;
    }

    @keyframes pulse-alert {
      from {
        box-shadow: 0 0 0 rgba(255, 108, 92, 0);
      }
      to {
        box-shadow: 0 0 18px rgba(255, 108, 92, 0.35);
      }
    }

    .status {
      margin-top: 12px;
      color: var(--warn);
    }

    .tag-row {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      margin-top: 8px;
    }

    .tag {
      border: 1px solid rgba(137, 178, 211, 0.22);
      border-radius: 999px;
      padding: 3px 7px;
      color: var(--muted);
      font-size: 11px;
      white-space: nowrap;
    }

    .summary-grid {
      display: grid;
      gap: 8px;
      margin-top: 10px;
    }

    .summary-card {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      align-items: center;
      gap: 8px;
      padding: 10px;
      border: 1px solid rgba(137, 178, 211, 0.18);
      border-radius: 8px;
      background: rgba(255, 255, 255, 0.035);
    }

    .summary-card span {
      grid-column: 1 / -1;
      color: var(--muted);
      font-size: 11px;
      text-transform: uppercase;
    }

    .summary-card strong {
      min-width: 0;
      color: var(--text);
      font-size: 15px;
      line-height: 1.2;
    }

    .summary-card button {
      min-height: 30px;
    }

    .upgrade-grid {
      display: grid;
      gap: 10px;
      margin-top: 12px;
    }

    .upgrade-card {
      position: relative;
      overflow: hidden;
      padding: 12px;
      border: 1px solid rgba(137, 178, 211, 0.22);
      border-radius: 8px;
      background: linear-gradient(135deg, rgba(17, 25, 34, 0.96), rgba(9, 13, 18, 0.96));
    }

    .upgrade-card::before {
      content: "";
      position: absolute;
      inset: 0;
      border-left: 4px solid var(--accent);
      pointer-events: none;
    }

    .slot-engine::before { border-left-color: #ff9f43; }
    .slot-fuel::before { border-left-color: #70d6ff; }
    .slot-hull::before { border-left-color: #b8c4d8; }
    .slot-cooling::before { border-left-color: #62e6c7; }
    .slot-sensors::before { border-left-color: #ffd166; }
    .slot-escape::before { border-left-color: #ff6c5c; }

    .card-topline {
      display: flex;
      justify-content: space-between;
      gap: 8px;
      color: var(--muted);
      font-size: 11px;
      text-transform: uppercase;
    }

    .module-art {
      position: absolute;
      top: 34px;
      right: 12px;
      display: grid;
      place-items: center;
      width: 42px;
      height: 42px;
      border: 1px solid rgba(237, 244, 248, 0.16);
      border-radius: 8px;
      background:
        linear-gradient(135deg, rgba(255, 255, 255, 0.16), rgba(255, 255, 255, 0.02)),
        rgba(103, 210, 255, 0.10);
      color: var(--text);
      font-weight: 800;
      font-size: 18px;
    }

    .upgrade-card h3 {
      max-width: calc(100% - 56px);
      margin-top: 10px;
      font-size: 16px;
      line-height: 1.2;
    }

    .module-threat {
      max-width: calc(100% - 56px);
      margin-top: 4px;
    }

    .module-impact {
      display: block;
      margin-top: 8px;
      color: var(--text);
      font-size: 14px;
    }

    .stat-grid {
      display: flex;
      flex-wrap: wrap;
      gap: 5px;
      margin-top: 10px;
    }

    .stat-chip {
      border: 1px solid rgba(137, 178, 211, 0.18);
      border-radius: 5px;
      padding: 3px 6px;
      color: var(--muted);
      background: rgba(255, 255, 255, 0.04);
      font-size: 11px;
    }

    .stat-chip.up {
      color: #b7ffd4;
      border-color: rgba(114, 224, 168, 0.26);
    }

    .stat-chip.down {
      color: #ffb7ad;
      border-color: rgba(255, 108, 92, 0.30);
    }

    .card-footer {
      display: grid;
      grid-template-columns: minmax(0, 1fr) minmax(112px, auto);
      align-items: center;
      gap: 8px;
      margin-top: 12px;
    }

    .card-footer span {
      color: var(--warn);
      font-size: 13px;
    }

    .card-footer button {
      min-height: 34px;
    }

    .ops-grid {
      display: grid;
      gap: 8px;
      margin-top: 10px;
    }

    .ops-card {
      padding: 10px;
      border: 1px solid rgba(137, 178, 211, 0.18);
      border-radius: 8px;
      background: rgba(255, 255, 255, 0.035);
    }

    .ops-card h3 {
      font-size: 14px;
      line-height: 1.2;
    }

    .ops-card p {
      margin-top: 4px;
    }

    .ops-card.repair {
      border-color: rgba(184, 196, 216, 0.26);
    }

    .ops-card.crew {
      border-color: rgba(255, 209, 102, 0.24);
    }

    .settings-footer {
      margin-top: 18px;
      padding-top: 12px;
      border-top: 1px solid rgba(137, 178, 211, 0.14);
    }

    .settings-footer button {
      width: 100%;
      min-height: 32px;
      opacity: 0.82;
    }

    .utility-row {
      display: flex;
      gap: 8px;
      margin-top: 10px;
    }

    .utility-row button {
      flex: 1;
    }

    .bottom-tools {
      margin-top: 16px;
      padding-top: 12px;
      border-top: 1px solid rgba(137, 178, 211, 0.14);
    }

    .detail-stack {
      display: grid;
      gap: 8px;
    }

    .detail-row {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      padding: 8px 0;
      border-bottom: 1px solid rgba(137, 178, 211, 0.12);
    }

    .detail-row span {
      color: var(--muted);
      font-size: 12px;
    }

    .detail-row strong {
      color: var(--text);
      font-size: 13px;
      text-align: right;
    }

    .detail-section {
      color: var(--text);
      font-size: 13px;
      font-weight: 800;
      letter-spacing: 0;
      margin-top: 14px;
      padding: 12px 0 6px;
      border-top: 1px solid rgba(137, 178, 211, 0.18);
    }

    .modal-root[hidden] {
      display: none;
    }

    .modal-root {
      position: fixed;
      inset: 0;
      z-index: 20;
      display: grid;
      place-items: center;
      padding: 18px;
      background: rgba(0, 0, 0, 0.52);
      backdrop-filter: blur(10px);
    }

    .modal-panel {
      width: min(520px, calc(100vw - 36px));
      max-height: min(72vh, 720px);
      overflow: auto;
      padding: 16px;
      border: 1px solid var(--panel-border);
      border-radius: 8px;
      background: rgba(13, 18, 25, 0.98);
      box-shadow: 0 26px 80px rgba(0, 0, 0, 0.48);
    }

    .modal-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 12px;
    }

    .modal-head h2 {
      margin: 0;
      color: var(--text);
      text-transform: none;
      font-size: 18px;
    }

    .modal-close {
      min-width: 34px;
      min-height: 34px;
      padding: 0;
    }

    .modal-actions {
      margin-top: 14px;
    }

    @media (max-width: 720px) {
      #panel {
        inset: auto 10px 10px 10px;
        width: auto;
        max-height: 52vh;
      }
    }
  </style>
</head>
<body>
  <canvas id="canvas" oncontextmenu="event.preventDefault()" tabindex="-1"></canvas>
  <aside id="panel">
    <h1>Rocket Rogue</h1>
    <p class="status">Loading WebAssembly...</p>
  </aside>
  <div id="modal-root" class="modal-root" hidden>
    <section class="modal-panel" role="dialog" aria-modal="true" aria-labelledby="modal-title">
      <div class="modal-head">
        <h2 id="modal-title"></h2>
        <button class="modal-close ghost" type="button" aria-label="Close">Close</button>
      </div>
      <div id="modal-content"></div>
    </section>
  </div>

  <script>
    const panel = document.getElementById("panel");
    const canvas = document.getElementById("canvas");
    const modalRoot = document.getElementById("modal-root");
    const modalTitle = document.getElementById("modal-title");
    const modalContent = document.getElementById("modal-content");
    const modalClose = modalRoot.querySelector(".modal-close");

    window.RocketBridge = {
      setPanel(html) {
        panel.innerHTML = html;
      },
      loadSave() {
        return window.localStorage.getItem("rocket_rogue_save_v1") || "";
      },
      storeSave(data) {
        window.localStorage.setItem("rocket_rogue_save_v1", data || "");
      },
      clearSave() {
        window.localStorage.removeItem("rocket_rogue_save_v1");
      }
    };

    function rrCall(name, args = [], sig = []) {
      if (!window.Module || !Module.ccall) {
        return;
      }
      Module.ccall(name, null, sig, args);
    }

    window.rr = {
      startLaunch: () => rrCall("rr_start_launch"),
      ejectNow: () => rrCall("rr_eject_now"),
      returnHome: () => rrCall("rr_return_home"),
      cutEngines: () => rrCall("rr_cut_engines"),
      pressureRelief: () => rrCall("rr_pressure_relief"),
      closeReliefValve: () => rrCall("rr_close_relief_valve"),
      jettisonCargo: () => rrCall("rr_jettison_cargo"),
      next: () => rrCall("rr_next"),
      attemptFrontier: () => rrCall("rr_attempt_frontier"),
      buyOffer: (index) => rrCall("rr_buy_offer", [index], ["number"]),
      rerollOffers: () => rrCall("rr_reroll_offers"),
      repairShip: () => rrCall("rr_repair_ship"),
      recruitCrew: () => rrCall("rr_recruit_crew"),
      trainCrew: () => rrCall("rr_train_crew"),
      restCrew: () => rrCall("rr_rest_crew"),
      resetSave: () => {
        if (window.confirm("Reset Rocket Rogue save data?")) {
          rrCall("rr_reset_save");
        }
      }
    };

    const rrActionIds = Object.freeze({
      startLaunch: "start_launch",
      ejectNow: "eject_now",
      returnHome: "return_home",
      cutEngines: "cut_engines",
      pressureRelief: "pressure_relief",
      closeReliefValve: "close_relief_valve",
      jettisonCargo: "jettison_cargo",
      next: "next",
      attemptFrontier: "attempt_frontier",
      buyOfferPrefix: "buy_offer:",
      rerollOffers: "reroll_offers",
      repairShip: "repair_ship",
      recruitCrew: "recruit_crew",
      trainCrew: "train_crew",
      restCrew: "rest_crew",
      resetSave: "reset_save"
    });

    const rrActions = {
      [rrActionIds.startLaunch]: () => rr.startLaunch(),
      [rrActionIds.ejectNow]: () => rr.ejectNow(),
      [rrActionIds.returnHome]: () => rr.returnHome(),
      [rrActionIds.cutEngines]: () => rr.cutEngines(),
      [rrActionIds.pressureRelief]: () => rr.pressureRelief(),
      [rrActionIds.closeReliefValve]: () => rr.closeReliefValve(),
      [rrActionIds.jettisonCargo]: () => rr.jettisonCargo(),
      [rrActionIds.next]: () => rr.next(),
      [rrActionIds.attemptFrontier]: () => rr.attemptFrontier(),
      [rrActionIds.rerollOffers]: () => rr.rerollOffers(),
      [rrActionIds.repairShip]: () => rr.repairShip(),
      [rrActionIds.recruitCrew]: () => rr.recruitCrew(),
      [rrActionIds.trainCrew]: () => rr.trainCrew(),
      [rrActionIds.restCrew]: () => rr.restCrew(),
      [rrActionIds.resetSave]: () => rr.resetSave()
    };

    let lastPanelActionAt = 0;
    let lastPanelAction = "";

    function openPanelModal(id) {
      const template = Array.from(panel.querySelectorAll("template[data-modal]"))
        .find((candidate) => candidate.dataset.modal === id);
      if (!template) {
        return false;
      }

      modalTitle.textContent = template.dataset.title || "Details";
      modalContent.innerHTML = template.innerHTML;
      modalRoot.hidden = false;
      modalClose.focus();
      return true;
    }

    function closePanelModal() {
      modalRoot.hidden = true;
      modalTitle.textContent = "";
      modalContent.innerHTML = "";
    }

    function runPanelAction(action) {
      if (action.startsWith(rrActionIds.buyOfferPrefix)) {
        const rawIndex = action.slice(rrActionIds.buyOfferPrefix.length);
        if (!/^\d+$/.test(rawIndex)) {
          return false;
        }
        const index = Number.parseInt(rawIndex, 10);
        if (Number.isInteger(index)) {
          lastPanelAction = action;
          lastPanelActionAt = performance.now();
          rr.buyOffer(index);
          return true;
        }
        return false;
      }

      const handler = rrActions[action];
      if (!handler) {
        return false;
      }
      lastPanelAction = action;
      lastPanelActionAt = performance.now();
      handler();
      return true;
    }

    function handlePanelAction(event) {
      const button = event.target.closest("button[data-rr-action]");
      const validContainer = button && (panel.contains(button) || modalRoot.contains(button));
      if (!button || !validContainer || button.disabled) {
        return;
      }

      const action = button.dataset.rrAction || "";
      event.preventDefault();
      event.stopPropagation();

      if (event.type === "click" && action === lastPanelAction && performance.now() - lastPanelActionAt < 180) {
        return;
      }

      runPanelAction(action);
      if (modalRoot.contains(button) && action === rrActionIds.resetSave) {
        closePanelModal();
      }
    }

    function handleModalTrigger(event) {
      const button = event.target.closest("button[data-ui-modal]");
      if (!button || !panel.contains(button) || button.disabled) {
        return;
      }
      event.preventDefault();
      event.stopPropagation();
      openPanelModal(button.dataset.uiModal || "");
    }

    panel.addEventListener("click", handleModalTrigger, true);
    panel.addEventListener("pointerdown", handlePanelAction, true);
    panel.addEventListener("click", handlePanelAction, true);
    panel.addEventListener("keydown", (event) => {
      if (event.key !== "Enter" && event.key !== " ") {
        return;
      }
      handleModalTrigger(event);
      handlePanelAction(event);
    }, true);
    modalRoot.addEventListener("pointerdown", handlePanelAction, true);
    modalRoot.addEventListener("click", (event) => {
      if (event.target === modalRoot || event.target === modalClose) {
        event.preventDefault();
        closePanelModal();
        return;
      }
      handlePanelAction(event);
    }, true);

    window.addEventListener("keydown", (event) => {
      if (event.key === "Escape" && !modalRoot.hidden) {
        closePanelModal();
        return;
      }
      if (event.repeat || event.ctrlKey || event.metaKey || event.altKey) {
        return;
      }
      if (event.key.toLowerCase() === "r") {
        rr.returnHome();
      } else if (event.key.toLowerCase() === "e") {
        rr.ejectNow();
      }
    });

    var Module = {
      canvas,
      print(text) {
        console.log(text);
      },
      printErr(text) {
        console.error(text);
      }
    };
  </script>
  {{{ SCRIPT }}}
</body>
</html>
