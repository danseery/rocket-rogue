<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Rocket Rogue POC</title>
  <style>
    :root {
      color-scheme: dark;
      --bg: #090b0f;
      --panel: rgba(13, 18, 25, 0.88);
      --panel-border: rgba(137, 178, 211, 0.28);
      --text: #edf4f8;
      --muted: #99a9b8;
      --accent: #67d2ff;
      --danger: #ff6c5c;
      --ok: #72e0a8;
      --warn: #ffd166;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      overflow: hidden;
      background: var(--bg);
      color: var(--text);
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    #canvas {
      display: block;
      position: fixed;
      inset: 0;
      width: 100vw;
      height: 100dvh;
      background: #05070a;
    }

    #panel {
      position: fixed;
      inset: 16px auto 16px 16px;
      width: min(440px, calc(100vw - 32px));
      max-height: calc(100dvh - 32px);
      overflow: auto;
      padding: 16px;
      border: 1px solid var(--panel-border);
      border-radius: 8px;
      background: var(--panel);
      backdrop-filter: blur(14px);
      box-shadow: 0 18px 60px rgba(0, 0, 0, 0.35);
    }

    #panel.phase-board-panel {
      inset: 24px;
      width: auto;
      max-height: calc(100dvh - 48px);
      padding: 18px;
    }

    .panel-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
    }

    .game-mark {
      display: block;
      margin-bottom: 3px;
      color: var(--muted);
      font-size: 11px;
      font-weight: 800;
      line-height: 1;
      text-transform: uppercase;
      letter-spacing: 0;
    }

    h1, h2, h3, p {
      margin: 0;
    }

    h1 {
      font-size: 21px;
      line-height: 1.15;
      letter-spacing: 0;
    }

    h2 {
      margin-top: 14px;
      font-size: 14px;
      text-transform: uppercase;
      color: var(--muted);
      letter-spacing: 0;
    }

    p, li {
      color: var(--muted);
      font-size: 13px;
      line-height: 1.45;
    }

    ul {
      margin: 8px 0 0;
      padding-left: 18px;
    }

    .metric-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 8px;
      margin-top: 12px;
    }

    .panel-kpis {
      margin-top: 14px;
    }

    .phase-board-panel > .panel-kpis {
      grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
      margin-bottom: 14px;
    }

    .flight-readout {
      grid-template-columns: repeat(3, minmax(0, 1fr));
    }

    .phase-board-panel > .metric-grid,
    .phase-board > .metric-grid {
      grid-template-columns: repeat(auto-fit, minmax(132px, 1fr));
    }

    .metric {
      border: 1px solid rgba(137, 178, 211, 0.18);
      border-radius: 6px;
      padding: 8px;
      background: rgba(255, 255, 255, 0.035);
    }

    .metric strong {
      display: block;
      color: var(--text);
      font-size: 16px;
      line-height: 1.2;
    }

    .metric span {
      color: var(--muted);
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0;
    }

    .actions {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 8px;
      margin-top: 14px;
    }

    .actions.launch-actions {
      grid-template-columns: repeat(3, minmax(0, 1fr));
    }

    .actions.primary-actions {
      grid-template-columns: repeat(3, minmax(0, 1fr));
    }

    .actions.system-actions {
      grid-template-columns: repeat(3, minmax(0, 1fr));
      margin-top: 8px;
    }

    .cockpit-hud {
      position: sticky;
      bottom: 12px;
      z-index: 8;
      width: 100%;
      max-width: 100%;
      margin-top: 16px;
      padding: 12px;
      border: 1px solid rgba(137, 178, 211, 0.24);
      border-radius: 10px;
      background:
        linear-gradient(180deg, rgba(13, 18, 25, 0.82), rgba(8, 12, 17, 0.92)),
        rgba(13, 18, 25, 0.88);
      box-shadow: 0 18px 60px rgba(0, 0, 0, 0.42);
      backdrop-filter: blur(12px);
    }

    .cockpit-label {
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      gap: 12px;
      padding: 0 2px 8px;
      border-bottom: 1px solid rgba(137, 178, 211, 0.12);
    }

    .cockpit-label span {
      color: var(--muted);
      font-size: 11px;
      font-weight: 800;
      text-transform: uppercase;
    }

    .cockpit-label strong {
      color: var(--text);
      font-size: 13px;
      line-height: 1.2;
    }

    .cockpit-hud .actions {
      margin-top: 10px;
    }

    .cockpit-hud button {
      min-height: 44px;
      font-weight: 650;
    }

    .cockpit-hud .primary-actions {
      grid-template-columns: repeat(3, minmax(0, 1fr));
    }

    .cockpit-hud .system-actions {
      grid-template-columns: repeat(3, minmax(0, 1fr));
    }

    .cockpit-hud .launch-commit-actions {
      grid-template-columns: 1fr;
    }

    .cockpit-hud .launch-button {
      min-height: 58px;
      font-size: 16px;
      font-weight: 800;
      text-transform: uppercase;
      letter-spacing: 0;
    }

    .cockpit-hold-copy {
      margin-top: 10px;
      min-height: 42px;
    }

    .scene-launch-control {
      position: fixed;
      z-index: 9;
      display: none;
      min-width: 190px;
      min-height: 70px;
      padding: 0 28px;
      border-color: rgba(114, 224, 168, 0.72);
      border-radius: 10px;
      background:
        radial-gradient(circle at 50% 20%, rgba(255, 255, 255, 0.22), transparent 28%),
        linear-gradient(180deg, rgba(114, 224, 168, 0.34), rgba(39, 119, 82, 0.58));
      box-shadow:
        0 0 28px rgba(114, 224, 168, 0.24),
        0 20px 60px rgba(0, 0, 0, 0.44);
      color: var(--text);
      font-size: 20px;
      font-weight: 900;
      text-transform: uppercase;
      letter-spacing: 0;
    }

    .scene-launch-control.is-visible {
      display: block;
      animation: launch-ready-pulse 1.2s ease-in-out infinite alternate;
    }

    @keyframes launch-ready-pulse {
      from {
        box-shadow:
          0 0 18px rgba(114, 224, 168, 0.18),
          0 20px 60px rgba(0, 0, 0, 0.44);
      }
      to {
        box-shadow:
          0 0 42px rgba(114, 224, 168, 0.36),
          0 20px 60px rgba(0, 0, 0, 0.44);
      }
    }

    button {
      min-height: 38px;
      min-width: 0;
      border: 1px solid rgba(137, 178, 211, 0.25);
      border-radius: 6px;
      background: rgba(103, 210, 255, 0.12);
      color: var(--text);
      font: inherit;
      font-size: 13px;
      cursor: pointer;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    button:hover {
      background: rgba(103, 210, 255, 0.2);
    }

    button:disabled {
      color: rgba(153, 169, 184, 0.62);
      cursor: not-allowed;
      background: rgba(255, 255, 255, 0.035);
    }

    button.danger {
      background: rgba(255, 108, 92, 0.16);
      border-color: rgba(255, 108, 92, 0.4);
    }

    button.ok {
      background: rgba(114, 224, 168, 0.16);
      border-color: rgba(114, 224, 168, 0.36);
    }

    button.warn {
      background: rgba(255, 209, 102, 0.18);
      border-color: rgba(255, 209, 102, 0.48);
    }

    button.ghost {
      min-height: 32px;
      background: rgba(255, 255, 255, 0.045);
      border-color: rgba(137, 178, 211, 0.18);
      color: var(--muted);
    }

    button.ghost:hover {
      color: var(--text);
      background: rgba(103, 210, 255, 0.12);
    }

    .warning-grid {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 6px;
      margin-top: 10px;
    }

    .warning-button {
      min-height: 48px;
      padding: 6px;
      border-color: rgba(137, 178, 211, 0.22);
      background: rgba(114, 224, 168, 0.08);
      cursor: default;
      text-align: left;
    }

    .warning-button:hover {
      background: rgba(114, 224, 168, 0.08);
    }

    .warning-button strong {
      display: block;
      font-size: 12px;
      line-height: 1.1;
      color: var(--text);
    }

    .warning-button span {
      display: block;
      margin-top: 4px;
      color: var(--muted);
      font-size: 12px;
      line-height: 1.1;
    }

    .warning-button.caution {
      border-color: rgba(255, 209, 102, 0.56);
      background: rgba(255, 209, 102, 0.14);
    }

    .warning-button.critical {
      border-color: rgba(255, 108, 92, 0.72);
      background: rgba(255, 108, 92, 0.20);
      animation: pulse-alert 0.55s ease-in-out infinite alternate;
    }

    @keyframes pulse-alert {
      from {
        box-shadow: 0 0 0 rgba(255, 108, 92, 0);
      }
      to {
        box-shadow: 0 0 18px rgba(255, 108, 92, 0.35);
      }
    }

    .status {
      margin-top: 12px;
      color: var(--warn);
      min-height: 19px;
    }

    .telemetry-status {
      display: flex;
      align-items: flex-start;
      min-height: 42px;
      margin-bottom: 0;
    }

    .telemetry-legend {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 8px;
      margin: 10px 0 12px;
    }

    .telemetry-chart-legend {
      position: fixed;
      left: 0;
      top: 0;
      z-index: 6;
      display: none;
      width: 0;
      margin: 0;
      pointer-events: none;
    }

    .telemetry-chart-legend.is-visible {
      display: grid;
    }

    .telemetry-legend-chip {
      display: grid;
      grid-template-columns: auto minmax(0, 1fr);
      grid-template-areas:
        "swatch title"
        "swatch detail";
      column-gap: 10px;
      row-gap: 2px;
      align-items: center;
      min-height: 52px;
      padding: 9px 10px;
      border: 1px solid rgba(137, 178, 211, 0.18);
      border-radius: 8px;
      background:
        linear-gradient(180deg, rgba(255, 255, 255, 0.035), rgba(255, 255, 255, 0.015)),
        rgba(9, 16, 24, 0.72);
      overflow: hidden;
    }

    .telemetry-legend-chip .swatch {
      grid-area: swatch;
      width: 28px;
      height: 28px;
      border-radius: 999px;
      border: 1px solid rgba(255, 255, 255, 0.16);
      box-shadow: 0 0 18px rgba(0, 0, 0, 0.28);
    }

    .telemetry-legend-chip strong {
      grid-area: title;
      color: var(--text);
      font-size: 12px;
      line-height: 1.1;
      text-transform: uppercase;
    }

    .telemetry-legend-chip small {
      grid-area: detail;
      color: var(--muted);
      font-size: 11px;
      line-height: 1.2;
    }

    .telemetry-legend-chip.warn {
      border-color: rgba(97, 220, 255, 0.28);
      background:
        radial-gradient(circle at 18% 50%, rgba(89, 205, 255, 0.14), transparent 42%),
        linear-gradient(180deg, rgba(255, 255, 255, 0.035), rgba(255, 255, 255, 0.015)),
        rgba(9, 16, 24, 0.72);
    }

    .telemetry-legend-chip.warn .swatch {
      background: linear-gradient(135deg, rgba(83, 218, 255, 1), rgba(255, 111, 72, 0.95));
    }

    .telemetry-legend-chip.heat {
      border-color: rgba(255, 196, 96, 0.26);
      background:
        radial-gradient(circle at 18% 50%, rgba(255, 196, 96, 0.12), transparent 42%),
        linear-gradient(180deg, rgba(255, 255, 255, 0.035), rgba(255, 255, 255, 0.015)),
        rgba(9, 16, 24, 0.72);
    }

    .telemetry-legend-chip.heat .swatch {
      background: linear-gradient(180deg, rgba(255, 232, 122, 1), rgba(255, 161, 50, 0.95));
    }

    .telemetry-legend-chip.threshold {
      border-color: rgba(255, 209, 102, 0.24);
      background:
        radial-gradient(circle at 18% 50%, rgba(255, 209, 102, 0.10), transparent 42%),
        linear-gradient(180deg, rgba(255, 255, 255, 0.035), rgba(255, 255, 255, 0.015)),
        rgba(9, 16, 24, 0.72);
    }

    .telemetry-legend-chip.threshold .swatch {
      position: relative;
      background: rgba(255, 209, 102, 0.10);
    }

    .telemetry-legend-chip.threshold .swatch::after {
      content: "";
      position: absolute;
      left: 4px;
      right: 4px;
      top: 50%;
      height: 3px;
      border-radius: 999px;
      background: rgba(255, 209, 102, 0.92);
      transform: translateY(-50%);
      box-shadow: 0 0 10px rgba(255, 209, 102, 0.38);
    }

    .tag-row {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      margin-top: 8px;
    }

    .tag {
      border: 1px solid rgba(137, 178, 211, 0.22);
      border-radius: 999px;
      padding: 3px 7px;
      color: var(--muted);
      font-size: 11px;
      white-space: nowrap;
    }

    .summary-grid {
      display: grid;
      gap: 8px;
      margin-top: 10px;
    }

    .phase-board-hangar .summary-grid {
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
    }

    .summary-card {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      align-items: center;
      gap: 8px;
      padding: 10px;
      border: 1px solid rgba(137, 178, 211, 0.18);
      border-radius: 8px;
      background: rgba(255, 255, 255, 0.035);
    }

    .summary-card span {
      grid-column: 1 / -1;
      color: var(--muted);
      font-size: 11px;
      text-transform: uppercase;
    }

    .summary-card strong {
      min-width: 0;
      color: var(--text);
      font-size: 15px;
      line-height: 1.2;
    }

    .summary-card button {
      min-height: 30px;
    }

    .upgrade-grid {
      display: grid;
      gap: 10px;
      margin-top: 12px;
    }

    .phase-board-panel .upgrade-grid,
    .phase-board-panel .ops-grid {
      grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
      align-items: stretch;
    }

    .upgrade-card {
      position: relative;
      overflow: hidden;
      padding: 12px;
      border: 1px solid rgba(137, 178, 211, 0.22);
      border-radius: 8px;
      background: linear-gradient(135deg, rgba(17, 25, 34, 0.96), rgba(9, 13, 18, 0.96));
    }

    .upgrade-card::before {
      content: "";
      position: absolute;
      inset: 0;
      border-left: 4px solid var(--accent);
      pointer-events: none;
    }

    .slot-engine::before { border-left-color: #ff9f43; }
    .slot-fuel::before { border-left-color: #70d6ff; }
    .slot-hull::before { border-left-color: #b8c4d8; }
    .slot-cooling::before { border-left-color: #62e6c7; }
    .slot-sensors::before { border-left-color: #ffd166; }
    .slot-escape::before { border-left-color: #ff6c5c; }

    .card-topline {
      display: flex;
      justify-content: space-between;
      gap: 8px;
      color: var(--muted);
      font-size: 11px;
      text-transform: uppercase;
    }

    .module-art {
      position: absolute;
      top: 34px;
      right: 12px;
      display: grid;
      place-items: center;
      width: 42px;
      height: 42px;
      border: 1px solid rgba(237, 244, 248, 0.16);
      border-radius: 8px;
      background:
        linear-gradient(135deg, rgba(255, 255, 255, 0.16), rgba(255, 255, 255, 0.02)),
        rgba(103, 210, 255, 0.10);
      color: var(--text);
      font-weight: 800;
      font-size: 18px;
    }

    .upgrade-card h3 {
      max-width: calc(100% - 56px);
      margin-top: 10px;
      font-size: 16px;
      line-height: 1.2;
    }

    .module-threat {
      max-width: calc(100% - 56px);
      margin-top: 4px;
    }

    .module-impact {
      display: block;
      margin-top: 8px;
      color: var(--text);
      font-size: 14px;
    }

    .stat-grid {
      display: flex;
      flex-wrap: wrap;
      gap: 5px;
      margin-top: 10px;
    }

    .stat-chip {
      border: 1px solid rgba(137, 178, 211, 0.18);
      border-radius: 5px;
      padding: 3px 6px;
      color: var(--muted);
      background: rgba(255, 255, 255, 0.04);
      font-size: 11px;
    }

    .stat-chip.up {
      color: #b7ffd4;
      border-color: rgba(114, 224, 168, 0.26);
    }

    .stat-chip.down {
      color: #ffb7ad;
      border-color: rgba(255, 108, 92, 0.30);
    }

    .card-footer {
      display: grid;
      grid-template-columns: minmax(0, 1fr) minmax(112px, auto);
      align-items: center;
      gap: 8px;
      margin-top: 12px;
    }

    .card-footer span {
      color: var(--warn);
      font-size: 13px;
    }

    .card-footer button {
      min-height: 34px;
    }

    .ops-grid {
      display: grid;
      gap: 8px;
      margin-top: 10px;
    }

    .phase-board {
      margin-top: 16px;
    }

    .phase-board-panel > .status {
      display: none;
    }

    .phase-status {
      max-width: 860px;
      margin: 0 0 12px;
      padding: 9px 11px;
      border: 1px solid rgba(255, 209, 102, 0.22);
      border-radius: 6px;
      background: rgba(255, 209, 102, 0.06);
      color: var(--warn);
    }

    .phase-board-hangar > .phase-status {
      display: none;
    }

    .phase-board > h2 {
      margin-top: 0;
      color: var(--text);
      font-size: 18px;
      text-transform: none;
    }

    .phase-board > p {
      max-width: 760px;
    }

    .phase-titlebar {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 16px;
      max-width: 980px;
    }

    .phase-titlebar h2 {
      margin: 0;
      color: var(--text);
      font-size: 18px;
      line-height: 1.2;
      text-transform: none;
    }

    .phase-titlebar p {
      margin: 4px 0 0;
      max-width: 680px;
      color: var(--muted);
      line-height: 1.35;
    }

    .board-note {
      display: inline-block;
      max-width: 760px;
      padding: 8px 10px;
      border: 1px solid rgba(255, 209, 102, 0.22);
      border-radius: 6px;
      background: rgba(255, 209, 102, 0.06);
    }

    .result-grid {
      display: grid;
      grid-template-columns: minmax(260px, 1.15fr) repeat(2, minmax(220px, 0.85fr));
      gap: 10px;
      margin-top: 14px;
      align-items: stretch;
    }

    .result-group {
      min-width: 0;
      border: 1px solid rgba(137, 178, 211, 0.2);
      border-radius: 8px;
      padding: 12px;
      background: rgba(255, 255, 255, 0.035);
    }

    .result-group.primary {
      border-color: rgba(114, 224, 168, 0.34);
      background: rgba(114, 224, 168, 0.06);
    }

    .result-group h3 {
      margin: 0 0 8px;
      color: var(--text);
      font-size: 14px;
      line-height: 1.2;
    }

    .result-row {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      padding: 8px 0;
      border-top: 1px solid rgba(137, 178, 211, 0.13);
    }

    .result-row:first-of-type {
      border-top: 0;
      padding-top: 0;
    }

    .result-row:last-child {
      padding-bottom: 0;
    }

    .result-row span {
      color: var(--muted);
      font-size: 11px;
      line-height: 1.2;
      text-transform: uppercase;
    }

    .result-row strong {
      color: var(--text);
      font-size: 15px;
      line-height: 1.2;
      text-align: right;
    }

    .achievement-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
      gap: 10px;
      max-width: 760px;
      margin-top: 10px;
    }

    .achievement-card {
      position: relative;
      overflow: hidden;
      padding: 12px 14px;
      border: 1px solid rgba(255, 209, 102, 0.44);
      border-radius: 8px;
      background:
        linear-gradient(135deg, rgba(255, 209, 102, 0.16), rgba(103, 210, 255, 0.05)),
        rgba(255, 255, 255, 0.035);
      box-shadow: inset 0 0 18px rgba(255, 209, 102, 0.05);
    }

    .achievement-card::before {
      content: "";
      position: absolute;
      inset: 0 auto 0 0;
      width: 4px;
      background: var(--warn);
    }

    .achievement-card span {
      display: block;
      color: var(--warn);
      font-size: 11px;
      font-weight: 800;
      text-transform: uppercase;
      letter-spacing: 0;
    }

    .achievement-card strong {
      display: block;
      margin-top: 5px;
      color: var(--text);
      font-size: 16px;
      line-height: 1.2;
    }

    .achievement-card p {
      margin-top: 5px;
      color: var(--muted);
      line-height: 1.35;
    }

    .phase-track {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 8px;
      max-width: 760px;
      margin: 12px 0;
      padding: 0;
      list-style: none;
    }

    .phase-track li {
      min-width: 0;
      padding: 9px 10px;
      border: 1px solid rgba(137, 178, 211, 0.18);
      border-radius: 8px;
      background: rgba(255, 255, 255, 0.032);
    }

    .phase-track span,
    .phase-track strong {
      display: block;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .phase-track span {
      color: var(--muted);

      text-transform: uppercase;

    }

    .phase-track strong {

    .phase-board-surface {

    .phase-board-surface > .phase-titlebar,

    .surface-command {

      gap: 10px;

    }

    .surface-command > div,
    .surface-command .phase-advisory {
      min-width: 0;
      padding: 10px 12px;

      border-radius: 8px;

    .surface-command > div span {

    .phase-advisory {

    }

    .phase-advisory strong {
      font-size: 14px;
      color: var(--text);
    }

    .phase-advisory span {
      color: var(--muted);
      line-height: 1.35;
    }

    .phase-advisory.ok {

    }

    .phase-advisory.caution {

    }

    .surface-kpi-grid {

    .surface-primary-action {
      display: grid;
      grid-template-columns: minmax(0, 1fr) minmax(190px, 240px);
      gap: 16px;
      align-items: center;
      max-width: 980px;

      border: 1px solid rgba(114, 224, 168, 0.42);

        linear-gradient(135deg, rgba(114, 224, 168, 0.14), rgba(103, 210, 255, 0.06)),

    .surface-primary-action span {

      text-transform: uppercase;
    }

    .surface-primary-action h3 {

    .surface-primary-action p {

    .surface-primary-action button {

    .surface-kpi {

    .surface-kpi span {

    }

    .surface-kpi strong {

    .board-primary {

    }

    .board-secondary {

    .board-secondary .detail-stack {

    .ops-card {

    .ops-card p {

    .surface-action-card {

    .surface-action-card.featured-action {

    .settings-control {

    .settings-control h3 {

    .settings-control p {

    .settings-control label {

    }

    .utility-row button {

    .compact-tools {

    }

    .compact-tools button {
      flex: 0 0 auto;

    .bottom-tools {

      padding-top: 12px;
      border-top: 1px solid rgba(137, 178, 211, 0.14);
    }

    .detail-stack {
      display: grid;
      gap: 8px;
    }

    .detail-row {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      padding: 8px 0;
      border-bottom: 1px solid rgba(137, 178, 211, 0.12);
    }

    .detail-row span {

    }

    .detail-row strong {

    .modal-panel {

      border: 1px solid var(--panel-border);
      border-radius: 8px;
      background: rgba(13, 18, 25, 0.98);
      box-shadow: 0 26px 80px rgba(0, 0, 0, 0.48);

    .modal-head {

      margin-bottom: 12px;

    .modal-head h2 {

      color: var(--text);
      text-transform: none;

    @media (max-width: 760px) {
      .telemetry-legend {
        grid-template-columns: 1fr;

      .telemetry-chart-legend {
        display: none;

      .pilot-card-grid {
        grid-template-columns: 1fr;
      }

      .pilot-card {

    .toast-root {
      position: fixed;
      right: 24px;
      bottom: 24px;
      z-index: 18;
      display: grid;
      gap: 8px;
      width: min(420px, calc(100vw - 48px));
      pointer-events: none;
    }

    .toast {
      padding: 12px 14px;
      border: 1px solid rgba(255, 209, 102, 0.34);
      border-radius: 8px;
      background: rgba(13, 18, 25, 0.94);
      color: var(--text);
      box-shadow: 0 18px 48px rgba(0, 0, 0, 0.42);
      animation: toast-in 140ms ease-out;
    }

    .toast strong {
      display: block;
      color: var(--warn);
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0;
    }

    .toast span {
      display: block;
      margin-top: 4px;
      color: var(--text);
      font-size: 13px;
      line-height: 1.35;
    }

    @keyframes toast-in {
      from {
        opacity: 0;
        transform: translateY(8px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @media (max-width: 720px) {
      #panel {
        inset: auto 10px 10px 10px;
        width: auto;
        max-height: 52vh;
      }

      #panel.phase-board-panel {
        inset: 10px;
        max-height: calc(100dvh - 20px);
      }

      .phase-board-panel > .metric-grid,
      .phase-board > .metric-grid,
      .result-grid,
      .phase-board-surface {

      }

      .phase-board-surface > .phase-titlebar,
      .phase-board-surface > .phase-track,
      .phase-board-surface > .board-note,
      .phase-board-surface > .phase-advisory,
      .phase-board-surface > .utility-row,
      .phase-board-surface > .metric-grid,
      .phase-board-surface > .surface-command,
      .phase-board-surface > .surface-kpi-grid,

      .board-secondary {

      .surface-command {

      .flight-readout {

      .surface-primary-action {

      .resource-bank {

      .resource-bank .stat-grid {

      }

      .toast-root {
        right: 12px;
        bottom: 12px;
        width: calc(100vw - 24px);

<body>
  <canvas id="canvas" oncontextmenu="event.preventDefault()" tabindex="-1"></canvas>
  <aside id="panel">
    <h1>Rocket Rogue</h1>
    <p class="status">Loading WebAssembly...</p>
  </aside>
  <button id="scene-launch-control" class="scene-launch-control" type="button">Launch</button>
  <div id="telemetry-chart-legend" class="telemetry-legend telemetry-chart-legend" aria-hidden="true">
    <div class="telemetry-legend-chip warn"><span class="swatch"></span><strong>Warning</strong><small>overall system risk trend</small></div>
    <div class="telemetry-legend-chip heat"><span class="swatch"></span><strong>Heat</strong><small>thermal buildup over the burn</small></div>
    <div class="telemetry-legend-chip threshold"><span class="swatch"></span><strong>Caution line</strong><small>where the burn starts feeling spicy</small></div>
  </div>
  <div id="toast-root" class="toast-root" aria-live="polite" aria-atomic="true"></div>
  <div id="modal-root" class="modal-root" hidden>
    <section class="modal-panel" role="dialog" aria-modal="true" aria-labelledby="modal-title">
      <div class="modal-head">
        <h2 id="modal-title"></h2>
        <button class="modal-close ghost" type="button" aria-label="Close">Close</button>
      </div>
      <div id="modal-content"></div>
    </section>
  </div>

  <script>
    const panel = document.getElementById("panel");
    const canvas = document.getElementById("canvas");
    const modalRoot = document.getElementById("modal-root");
    const modalTitle = document.getElementById("modal-title");
    const modalContent = document.getElementById("modal-content");
    const modalClose = modalRoot.querySelector(".modal-close");
    const toastRoot = document.getElementById("toast-root");
    const sceneLaunchControl = document.getElementById("scene-launch-control");
    const telemetryChartLegend = document.getElementById("telemetry-chart-legend");
    let lastToastText = "";
    let lastToastAt = 0;
    const gameSpeedStorageKey = "rocket_rogue_game_speed";
    const gameSpeedOptions = Object.freeze(["0.5", "1", "1.5", "2", "3", "5", "8"]);
    const helpDisabledStorageKey = "rocket_rogue_help_disabled";
    const helpDismissedStorageKey = "rocket_rogue_help_dismissed_v1";

    function normalizedGameSpeed(value) {
      const numeric = Number(value);
      if (!Number.isFinite(numeric)) {
        return "1";
      }
      const exact = gameSpeedOptions.find((candidate) => Number(candidate) === numeric);
      if (exact) {
        return exact;
      }
      const clamped = Math.min(8, Math.max(0.25, numeric));
      return String(clamped);
    }

    function gameSpeedMultiplier() {
      try {
        return Number(normalizedGameSpeed(window.localStorage.getItem(gameSpeedStorageKey) || "1"));
      } catch (error) {
        return 1;
      }
    }

    function setGameSpeedMultiplier(value) {
      const normalized = normalizedGameSpeed(value);
      try {
        if (normalized === "1") {
          window.localStorage.removeItem(gameSpeedStorageKey);
        } else {
          window.localStorage.setItem(gameSpeedStorageKey, normalized);
        }
      } catch (error) {
        return 1;
      }
      return Number(normalized);
    }

    function syncGameSpeedControls(root = document) {
      const speed = normalizedGameSpeed(String(gameSpeedMultiplier()));
      root.querySelectorAll("[data-game-speed-select]").forEach((select) => {
        select.value = gameSpeedOptions.includes(speed) ? speed : "1";
      });
    }

    function helpDisabled() {
      try {
        return window.localStorage.getItem(helpDisabledStorageKey) === "1";
      } catch (error) {
        return false;
      }
    }

    function setHelpDisabled(disabled) {
      try {
        if (disabled) {
          window.localStorage.setItem(helpDisabledStorageKey, "1");
        } else {
          window.localStorage.removeItem(helpDisabledStorageKey);
        }
      } catch (error) {
        return;
      }
    }

    function dismissedHelpTopics() {
      try {
        const parsed = JSON.parse(window.localStorage.getItem(helpDismissedStorageKey) || "[]");
        return new Set(Array.isArray(parsed) ? parsed.filter((item) => typeof item === "string") : []);
      } catch (error) {
        return new Set();
      }
    }

    function dismissHelpTopic(topic) {
      if (!topic) {
        return;
      }
      const topics = dismissedHelpTopics();
      topics.add(topic);
      try {
        window.localStorage.setItem(helpDismissedStorageKey, JSON.stringify(Array.from(topics)));
      } catch (error) {
        return;
      }
    }

    function syncHelpControls(root = document) {
      const disabled = helpDisabled();
      const dismissed = dismissedHelpTopics();
      root.querySelectorAll("[data-help-toggle]").forEach((input) => {
        input.checked = !disabled;
      });
      root.querySelectorAll("[data-help-topic]").forEach((card) => {
        const topic = card.dataset.helpTopic || "";
        card.hidden = disabled || dismissed.has(topic);
      });
    }

    function syncLocalControls(root = document) {
      syncGameSpeedControls(root);
      syncHelpControls(root);
    }

    function sceneMetrics() {
      const width = Math.max(1, canvas.clientWidth || window.innerWidth || 1);
      const height = Math.max(1, canvas.clientHeight || window.innerHeight || 1);
      let leftPx = 0;
      if (panel && width > 720) {
        const rect = panel.getBoundingClientRect();
        leftPx = Math.max(0, rect.right + 24);
        if (width - leftPx < 520) {
          leftPx = 0;
        }
      }
      const sceneWidth = Math.max(1, width - leftPx);
      const unit = Math.max(1, Math.min(sceneWidth, height) * 0.5 * 0.92);
      return {
        width,
        height,
        left: leftPx,
        centerX: leftPx + sceneWidth * 0.5,
        centerY: height * 0.5,
        unit
      };
    }

    function worldToScreen(x, y) {
      const scene = sceneMetrics();
      return {
        x: scene.centerX + x * scene.unit,
        y: scene.centerY - y * scene.unit,
        unit: scene.unit
      };
    }

    function syncSceneOverlays() {
      const preflight = Boolean(panel.querySelector("[data-preflight-launch]"));
      const flight = Boolean(panel.querySelector(".flight-hud"));
      const phaseBoard = panel.classList.contains("phase-board-panel");

      sceneLaunchControl.classList.toggle("is-visible", preflight && !phaseBoard);
      sceneLaunchControl.hidden = !(preflight && !phaseBoard);
      if (preflight && !phaseBoard) {
        const anchor = worldToScreen(0.04, -0.60);
        sceneLaunchControl.style.left = `${Math.round(anchor.x)}px`;
        sceneLaunchControl.style.top = `${Math.round(anchor.y)}px`;
        sceneLaunchControl.style.transform = "translate(-50%, -50%)";
      }

      const showLegend = flight && !preflight && !phaseBoard;
      telemetryChartLegend.classList.toggle("is-visible", showLegend);
      telemetryChartLegend.hidden = !showLegend;
      if (showLegend) {
        const graphTopLeft = worldToScreen(0.25, -0.58);
        const graphRight = worldToScreen(1.22, -0.58);
        const graphBottom = worldToScreen(0.25, -0.86);
        const graphWidth = Math.max(300, graphRight.x - graphTopLeft.x);
        telemetryChartLegend.style.left = `${Math.round(graphTopLeft.x + 12)}px`;
        telemetryChartLegend.style.top = `${Math.round(graphTopLeft.y + 10)}px`;
        telemetryChartLegend.style.width = `${Math.round(Math.min(graphWidth - 24, 520))}px`;
        telemetryChartLegend.style.gridTemplateColumns = graphWidth < 500 ? "1fr" : "repeat(3, minmax(0, 1fr))";
      }
    }

    function showToast(message) {
      const text = (message || "").trim();
      if (!text) {
        return;
      }
      const now = performance.now();
      if (text === lastToastText && now - lastToastAt < 900) {
        return;
      }
      lastToastText = text;
      lastToastAt = now;

      const toast = document.createElement("div");
      toast.className = "toast";
      toast.innerHTML = `<strong>Mission update</strong><span></span>`;
      toast.querySelector("span").textContent = text;
      toastRoot.appendChild(toast);
      while (toastRoot.children.length > 3) {
        toastRoot.firstElementChild?.remove();
      }
      window.setTimeout(() => {
        toast.remove();
      }, 7000);
    }

    window.RocketBridge = {
      setPanel(html) {
        panel.innerHTML = html;
        syncLocalControls(panel);
        const mode = panel.querySelector("[data-panel-mode]")?.dataset.panelMode || "";
        const phaseBoard = mode === "phase-board";
        panel.classList.toggle("phase-board-panel", phaseBoard);
        if (phaseBoard) {
          showToast(panel.querySelector(".phase-status")?.textContent || "");
        }
        syncSceneOverlays();
      },
      loadSave() {
        return window.localStorage.getItem("rocket_rogue_save_v1") || "";
      },
      storeSave(data) {
        window.localStorage.setItem("rocket_rogue_save_v1", data || "");
      },
      clearSave() {
        window.localStorage.removeItem("rocket_rogue_save_v1");
      },
      gameSpeedMultiplier() {
        return gameSpeedMultiplier();
      }
    };

    sceneLaunchControl.addEventListener("click", (event) => {
      event.preventDefault();
      rr.startLaunch();
    });

    window.addEventListener("resize", syncSceneOverlays);
    window.visualViewport?.addEventListener("resize", syncSceneOverlays);
    window.visualViewport?.addEventListener("scroll", syncSceneOverlays);

    function rrCall(name, args = [], sig = []) {
      if (typeof Module === "undefined") {
        return;
      }
      const directExport = Module[`_${name}`];
      if (typeof directExport === "function") {
        directExport(...args);
        return;
      }
      if (!Module.ccall) {
        console.warn(`Rocket Rogue action bridge missing export: ${name}`);
        return;
      }
      Module.ccall(name, null, sig, args);
    }

    window.rr = {
      prepareLaunch: () => rrCall("rr_prepare_launch"),
      startLaunch: () => rrCall("rr_start_launch"),
      ejectNow: () => rrCall("rr_eject_now"),
      returnHome: () => rrCall("rr_return_home"),
      arrivalOps: () => rrCall("rr_arrival_ops"),
      cutEngines: () => rrCall("rr_cut_engines"),
      pressureRelief: () => rrCall("rr_pressure_relief"),
      closeReliefValve: () => rrCall("rr_close_relief_valve"),
      jettisonCargo: () => rrCall("rr_jettison_cargo"),
      next: () => rrCall("rr_next"),
      attemptFrontier: () => rrCall("rr_attempt_frontier"),
      buyOffer: (index) => rrCall("rr_buy_offer", [index], ["number"]),
      rerollOffers: () => rrCall("rr_reroll_offers"),
      arrivalFlyby: () => rrCall("rr_arrival_flyby"),
      arrivalOrbit: () => rrCall("rr_arrival_orbit"),
      arrivalLanding: () => rrCall("rr_arrival_landing"),
      researchProject: (index) => rrCall("rr_research_project", [index], ["number"]),
      skipResearch: () => rrCall("rr_skip_research"),
      surveySurface: () => rrCall("rr_survey_surface"),
      mineSurface: () => rrCall("rr_mine_surface"),
      pushSurface: () => rrCall("rr_push_surface"),
      extractSurface: () => rrCall("rr_extract_surface"),
      miningMove: (xAxis, yAxis) => rrCall("rr_mining_move", [xAxis, yAxis], ["number", "number"]),
      miningAim: (x, y) => rrCall("rr_mining_aim", [x, y], ["number", "number"]),
      miningDrill: (active) => rrCall("rr_mining_drill", [active ? 1 : 0], ["number"]),
      miningScanner: () => rrCall("rr_mining_scanner"),
      miningStow: () => rrCall("rr_mining_stow"),
      miningAbort: () => rrCall("rr_mining_abort"),
      repairShip: () => rrCall("rr_repair_ship"),
      recruitCrew: () => rrCall("rr_recruit_crew"),
      recruitCandidate: (index) => rrCall("rr_recruit_candidate", [index], ["number"]),
      trainCrew: () => rrCall("rr_train_crew"),
      restCrew: () => rrCall("rr_rest_crew"),
      resetSave: () => {
        if (window.confirm("Reset Rocket Rogue save data?")) {
          rrCall("rr_reset_save");
        }
      }
    };

    const rrActionIds = Object.freeze({
      prepareLaunch: "prepare_launch",
      startLaunch: "start_launch",
      ejectNow: "eject_now",
      returnHome: "return_home",
      arrivalOps: "arrival_ops",
      cutEngines: "cut_engines",
      pressureRelief: "pressure_relief",
      closeReliefValve: "close_relief_valve",
      jettisonCargo: "jettison_cargo",
      next: "next",
      attemptFrontier: "attempt_frontier",
      buyOfferPrefix: "buy_offer:",
      researchProjectPrefix: "research_project:",
      rerollOffers: "reroll_offers",
      arrivalFlyby: "arrival_flyby",
      arrivalOrbit: "arrival_orbit",
      arrivalLanding: "arrival_landing",
      skipResearch: "skip_research",
      surveySurface: "survey_surface",
      mineSurface: "mine_surface",
      pushSurface: "push_surface",
      extractSurface: "extract_surface",
      miningScanner: "mining_scanner",
      miningStow: "mining_stow",
      miningAbort: "mining_abort",
      repairShip: "repair_ship",
      recruitCrew: "recruit_crew",
      recruitCandidatePrefix: "recruit_candidate:",
      trainCrew: "train_crew",
      restCrew: "rest_crew",
      resetSave: "reset_save"
    });

    const rrActions = {
      [rrActionIds.prepareLaunch]: () => rr.prepareLaunch(),
      [rrActionIds.startLaunch]: () => rr.startLaunch(),
      [rrActionIds.ejectNow]: () => rr.ejectNow(),
      [rrActionIds.returnHome]: () => rr.returnHome(),
      [rrActionIds.arrivalOps]: () => rr.arrivalOps(),
      [rrActionIds.cutEngines]: () => rr.cutEngines(),
      [rrActionIds.pressureRelief]: () => rr.pressureRelief(),
      [rrActionIds.closeReliefValve]: () => rr.closeReliefValve(),
      [rrActionIds.jettisonCargo]: () => rr.jettisonCargo(),
      [rrActionIds.next]: () => rr.next(),
      [rrActionIds.attemptFrontier]: () => rr.attemptFrontier(),
      [rrActionIds.rerollOffers]: () => rr.rerollOffers(),
      [rrActionIds.arrivalFlyby]: () => rr.arrivalFlyby(),
      [rrActionIds.arrivalOrbit]: () => rr.arrivalOrbit(),
      [rrActionIds.arrivalLanding]: () => rr.arrivalLanding(),
      [rrActionIds.skipResearch]: () => rr.skipResearch(),
      [rrActionIds.surveySurface]: () => rr.surveySurface(),
      [rrActionIds.mineSurface]: () => rr.mineSurface(),
      [rrActionIds.pushSurface]: () => rr.pushSurface(),
      [rrActionIds.extractSurface]: () => rr.extractSurface(),
      [rrActionIds.miningScanner]: () => rr.miningScanner(),
      [rrActionIds.miningStow]: () => rr.miningStow(),
      [rrActionIds.miningAbort]: () => rr.miningAbort(),
      [rrActionIds.repairShip]: () => rr.repairShip(),
      [rrActionIds.recruitCrew]: () => rr.recruitCrew(),
      [rrActionIds.trainCrew]: () => rr.trainCrew(),
      [rrActionIds.restCrew]: () => rr.restCrew(),
      [rrActionIds.resetSave]: () => rr.resetSave()
    };

    let lastPanelActionAt = 0;
    let lastPanelAction = "";
    let lastPanelModalAt = 0;
    let lastPanelModal = "";

    function closestFromEvent(event, selector) {
      let target = event.target;
      if (target && target.nodeType !== 1) {
        target = target.parentElement;
      }
      return target && typeof target.closest === "function" ? target.closest(selector) : null;
    }

    function openPanelModal(id) {
      const template = Array.from(panel.querySelectorAll("template[data-modal]"))
        .find((candidate) => candidate.dataset.modal === id);
      if (!template) {
        return false;
      }

      modalTitle.textContent = template.dataset.title || "Details";
      modalContent.innerHTML = template.innerHTML;
      syncLocalControls(modalContent);
      modalRoot.hidden = false;
      modalClose.focus();
      return true;
    }

    function closePanelModal() {
      modalRoot.hidden = true;
      modalTitle.textContent = "";
      modalContent.innerHTML = "";
    }

    function runPanelAction(action) {
      if (action.startsWith(rrActionIds.buyOfferPrefix)) {
        const rawIndex = action.slice(rrActionIds.buyOfferPrefix.length);
        if (!/^\d+$/.test(rawIndex)) {
          return false;
        }
        const index = Number.parseInt(rawIndex, 10);
        if (Number.isInteger(index)) {
          lastPanelAction = action;
          lastPanelActionAt = performance.now();
          rr.buyOffer(index);
          return true;
        }
        return false;
      }

      if (action.startsWith(rrActionIds.researchProjectPrefix)) {
        const rawIndex = action.slice(rrActionIds.researchProjectPrefix.length);
        if (!/^\d+$/.test(rawIndex)) {
          return false;
        }
        const index = Number.parseInt(rawIndex, 10);
        if (Number.isInteger(index)) {
          lastPanelAction = action;
          lastPanelActionAt = performance.now();
          rr.researchProject(index);
          return true;
        }
        return false;
      }

      if (action.startsWith(rrActionIds.recruitCandidatePrefix)) {
        const rawIndex = action.slice(rrActionIds.recruitCandidatePrefix.length);
        if (!/^\d+$/.test(rawIndex)) {
          return false;
        }
        const index = Number.parseInt(rawIndex, 10);
        if (Number.isInteger(index)) {
          lastPanelAction = action;
          lastPanelActionAt = performance.now();
          rr.recruitCandidate(index);
          return true;
        }
        return false;
      }

      const handler = rrActions[action];
      if (!handler) {
        return false;
      }
      lastPanelAction = action;
      lastPanelActionAt = performance.now();
      handler();
      return true;
    }

    function handlePanelAction(event) {
      const button = closestFromEvent(event, "button[data-rr-action]");
      const validContainer = button && (panel.contains(button) || modalRoot.contains(button));
      if (!button || !validContainer || button.disabled) {
        return;
      }

      const action = button.dataset.rrAction || "";
      event.preventDefault();
      event.stopPropagation();

      if (event.type === "click" && action === lastPanelAction && performance.now() - lastPanelActionAt < 180) {
        return;
      }

      const ranAction = runPanelAction(action);
      if (ranAction && modalRoot.contains(button)) {
        closePanelModal();
      }
    }

    function handleModalTrigger(event) {
      const button = closestFromEvent(event, "button[data-ui-modal]");
      const validContainer = button && (panel.contains(button) || modalRoot.contains(button));
      if (!button || !validContainer || button.disabled) {
        return;
      }
      const modalId = button.dataset.uiModal || "";
      event.preventDefault();
      event.stopPropagation();

      if (event.type === "click" && modalId === lastPanelModal && performance.now() - lastPanelModalAt < 180) {
        return;
      }

      if (openPanelModal(modalId)) {
        lastPanelModal = modalId;
        lastPanelModalAt = performance.now();
      }
    }

    function handleSettingsChange(event) {
      const select = closestFromEvent(event, "[data-game-speed-select]");
      if (select && (panel.contains(select) || modalRoot.contains(select))) {
        setGameSpeedMultiplier(select.value);
        syncLocalControls(panel);
        syncLocalControls(modalRoot);
        return;
      }

      const helpToggle = closestFromEvent(event, "[data-help-toggle]");
      if (helpToggle && (panel.contains(helpToggle) || modalRoot.contains(helpToggle))) {
        setHelpDisabled(!helpToggle.checked);
        syncLocalControls(panel);
        syncLocalControls(modalRoot);
      }
    }

    function handleHelpDismiss(event) {
      const button = closestFromEvent(event, "[data-help-dismiss]");
      if (!button || !(panel.contains(button) || modalRoot.contains(button))) {
        return;
      }
      event.preventDefault();
      event.stopPropagation();
      dismissHelpTopic(button.dataset.helpDismiss || "");
      syncLocalControls(panel);
      syncLocalControls(modalRoot);
    }

    document.addEventListener("pointerdown", handleModalTrigger, true);
    document.addEventListener("click", handleModalTrigger, true);
    document.addEventListener("pointerdown", handleHelpDismiss, true);
    document.addEventListener("click", handleHelpDismiss, true);
    document.addEventListener("change", handleSettingsChange, true);
    document.addEventListener("pointerdown", handlePanelAction, true);
    document.addEventListener("click", handlePanelAction, true);
    panel.addEventListener("keydown", (event) => {
      if (event.key !== "Enter" && event.key !== " ") {
        return;
      }
      handleModalTrigger(event);
      handlePanelAction(event);
    }, true);
    modalRoot.addEventListener("click", (event) => {
      if (performance.now() - lastPanelModalAt < 220) {
        event.preventDefault();
        event.stopPropagation();
        return;
      }
      if (event.target === modalRoot || event.target === modalClose) {
        event.preventDefault();
        closePanelModal();
        return;
      }
      handlePanelAction(event);
    }, true);

    const miningKeys = new Set();
    let miningPointerDown = false;

    function isMiningActive() {
      return Boolean(panel.querySelector(".phase-board-mining"));
    }

    function updateMiningMove() {
      const left = miningKeys.has("a") || miningKeys.has("arrowleft");
      const right = miningKeys.has("d") || miningKeys.has("arrowright");
      const up = miningKeys.has("w") || miningKeys.has("arrowup");
      const down = miningKeys.has("s") || miningKeys.has("arrowdown");
      rr.miningMove((right ? 1 : 0) - (left ? 1 : 0), (down ? 1 : 0) - (up ? 1 : 0));
    }

    function updateMiningAimFromPointer(event) {
      const rect = canvas.getBoundingClientRect();
      const panelRect = panel.getBoundingClientRect();
      const sceneLeft = Math.min(rect.right, Math.max(rect.left, panelRect.right));
      const sceneWidth = Math.max(1, rect.right - sceneLeft);
      if (sceneWidth <= 0 || rect.height <= 0) {
        return;
      }
      rr.miningAim((event.clientX - sceneLeft) / sceneWidth, (event.clientY - rect.top) / rect.height);
    }

    function handleMiningKeyDown(event) {
      if (!isMiningActive() || event.ctrlKey || event.metaKey || event.altKey) {
        return false;
      }
      const key = event.key.toLowerCase();
      if (["w", "a", "s", "d", "arrowup", "arrowdown", "arrowleft", "arrowright"].includes(key)) {
        miningKeys.add(key);
        updateMiningMove();
        event.preventDefault();
        return true;
      }
      if (key === " ") {
        rr.miningDrill(true);
        event.preventDefault();
        return true;
      }
      if (!event.repeat && key === "e") {
        rr.miningScanner();
        event.preventDefault();
        return true;
      }
      if (!event.repeat && key === "r") {
        rr.miningStow();
        event.preventDefault();
        return true;
      }
      if (!event.repeat && key === "escape") {
        rr.miningAbort();
        event.preventDefault();
        return true;
      }
      return false;
    }

    function handleMiningKeyUp(event) {
      const key = event.key.toLowerCase();
      if (miningKeys.delete(key)) {
        updateMiningMove();
        event.preventDefault();
        return;
      }
      if (key === " ") {
        rr.miningDrill(false);
        event.preventDefault();
      }
    }

    canvas.addEventListener("pointerdown", (event) => {
      if (!isMiningActive()) {
        return;
      }
      miningPointerDown = true;
      canvas.setPointerCapture?.(event.pointerId);
      updateMiningAimFromPointer(event);
      rr.miningDrill(true);
      event.preventDefault();
    });

    canvas.addEventListener("pointermove", (event) => {
      if (!isMiningActive()) {
        return;
      }
      updateMiningAimFromPointer(event);
    });

    canvas.addEventListener("pointerup", (event) => {
      if (!miningPointerDown) {
        return;
      }
      miningPointerDown = false;
      rr.miningDrill(false);
      canvas.releasePointerCapture?.(event.pointerId);
      event.preventDefault();
    });

    window.addEventListener("keydown", (event) => {
      if (event.key === "Escape" && !modalRoot.hidden) {
        closePanelModal();
        return;
      }
      if (handleMiningKeyDown(event)) {
        return;
      }
      if (event.repeat || event.ctrlKey || event.metaKey || event.altKey) {
        return;
      }
      if (event.key.toLowerCase() === "r") {
        rr.returnHome();
      } else if (event.key.toLowerCase() === "e") {
        rr.ejectNow();
      }
    });

    window.addEventListener("keyup", handleMiningKeyUp);

    var Module = {
      canvas,
      locateFile(path, prefix) {
        const base = (prefix || "") + path;
        return path.endsWith(".wasm") ? `${base}?v=${Date.now()}` : base;
      },
      print(text) {
        console.log(text);
      },
      printErr(text) {
        console.error(text);
      }
    };
  </script>
